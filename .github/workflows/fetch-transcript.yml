name: Fetch YouTube Transcript

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL or ID'
        required: true
        type: string

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install yt-dlp
        run: |
          pip install yt-dlp

      - name: Extract video ID
        id: extract
        run: |
          INPUT="${{ github.event.inputs.video_url }}"
          # Handle full URLs or just video IDs
          if [[ "$INPUT" == *"youtube.com"* ]] || [[ "$INPUT" == *"youtu.be"* ]]; then
            # Extract ID from URL
            VIDEO_ID=$(echo "$INPUT" | sed -E 's/.*[?&]v=([^&]+).*/\1/' | sed -E 's/.*youtu\.be\/([^?]+).*/\1/')
          else
            VIDEO_ID="$INPUT"
          fi
          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "Extracted video ID: $VIDEO_ID"

      - name: Fetch transcript
        id: transcript
        run: |
          VIDEO_ID="${{ steps.extract.outputs.video_id }}"
          echo "Fetching transcript for: $VIDEO_ID"
          
          # Try to get English transcript, fall back to auto-generated
          yt-dlp --write-subs --write-auto-subs --sub-lang en --skip-download --sub-format vtt -o "transcript" "https://www.youtube.com/watch?v=$VIDEO_ID" || true
          
          # Convert VTT to plain text
          if [ -f transcript.en.vtt ]; then
            # Remove VTT formatting, timestamps, and duplicates
            grep -v "^WEBVTT" transcript.en.vtt | \
            grep -v "^Kind:" | \
            grep -v "^Language:" | \
            grep -v "^[0-9][0-9]:[0-9][0-9]" | \
            grep -v "^\s*$" | \
            grep -v "^NOTE" | \
            sed 's/<[^>]*>//g' | \
            awk '!seen[$0]++' > transcript.txt
            echo "Transcript saved to transcript.txt"
          elif [ -f transcript.en-US.vtt ]; then
            grep -v "^WEBVTT" transcript.en-US.vtt | \
            grep -v "^Kind:" | \
            grep -v "^Language:" | \
            grep -v "^[0-9][0-9]:[0-9][0-9]" | \
            grep -v "^\s*$" | \
            grep -v "^NOTE" | \
            sed 's/<[^>]*>//g' | \
            awk '!seen[$0]++' > transcript.txt
            echo "Transcript saved to transcript.txt"
          else
            echo "No transcript found for video $VIDEO_ID" > transcript.txt
            echo "::warning::No transcript available for this video"
          fi

      - name: Upload transcript as artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript-${{ steps.extract.outputs.video_id }}
          path: transcript.txt
          retention-days: 7

      - name: Output transcript preview
        run: |
          echo "=== TRANSCRIPT PREVIEW (first 100 lines) ==="
          head -100 transcript.txt
          echo ""
          echo "=== FULL TRANSCRIPT LENGTH ==="
          wc -l transcript.txt
