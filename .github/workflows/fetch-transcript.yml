name: Fetch YouTube Transcript

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL or ID'
        required: true
        type: string

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest

    steps:
      - name: Extract video ID
        id: extract
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.video_url }}"
          if [[ "$INPUT" =~ ^[A-Za-z0-9_-]{11}$ ]]; then
            VIDEO_ID="$INPUT"
          elif [[ "$INPUT" == *"youtube.com/watch"* ]]; then
            VIDEO_ID=$(echo "$INPUT" | sed -E 's/.*[?&]v=([^&]+).*/\1/')
          elif [[ "$INPUT" == *"youtube.com/live/"* ]]; then
            VIDEO_ID=$(echo "$INPUT" | sed -E 's#.*youtube\.com/live/([^?&/]+).*#\1#')
          elif [[ "$INPUT" == *"youtu.be/"* ]]; then
            VIDEO_ID=$(echo "$INPUT" | sed -E 's#.*youtu\.be/([^?&/]+).*#\1#')
          else
            VIDEO_ID="$INPUT"
          fi
          SAFE_NAME=$(echo "$VIDEO_ID" | tr -cd 'A-Za-z0-9._-')
          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "artifact_name=transcript-$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "Extracted video ID: $VIDEO_ID"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install youtube-transcript-api

      - name: Print package version and API surface
        run: |
          python - << 'EOF'
          import youtube_transcript_api
          from youtube_transcript_api import YouTubeTranscriptApi
          print('youtube_transcript_api version:', getattr(youtube_transcript_api, '__version__', 'unknown'))
          print('YouTubeTranscriptApi attrs:', [a for a in dir(YouTubeTranscriptApi) if not a.startswith('_')])
          EOF

      - name: Fetch transcript
        shell: bash
        run: |
          VIDEO_ID="${{ steps.extract.outputs.video_id }}"
          echo "Fetching transcript for: $VIDEO_ID"

          python << 'EOF'
          import sys
          video_id = "${{ steps.extract.outputs.video_id }}"

          try:
              from youtube_transcript_api import YouTubeTranscriptApi
              from youtube_transcript_api import TranscriptsDisabled, NoTranscriptFound, VideoUnavailable
          except Exception:
              from youtube_transcript_api import YouTubeTranscriptApi
              try:
                  from youtube_transcript_api._errors import TranscriptsDisabled, NoTranscriptFound, VideoUnavailable
              except Exception:
                  TranscriptsDisabled = NoTranscriptFound = VideoUnavailable = Exception

          def write(msg):
              with open('transcript.txt', 'w', encoding='utf-8') as f:
                  f.write(msg)

          try:
              # Newer API style: instance with fetch(video_id, languages=[...])
              try:
                  api = YouTubeTranscriptApi()
                  data = api.fetch(video_id, languages=['en', 'en-US', 'en-GB'])
              except TypeError:
                  # Older API style: static get_transcript(video_id, languages=[...])
                  data = YouTubeTranscriptApi.get_transcript(video_id, languages=['en', 'en-US', 'en-GB'])
              except AttributeError:
                  # Fallback older API style
                  data = YouTubeTranscriptApi.get_transcript(video_id, languages=['en', 'en-US', 'en-GB'])

              texts = []
              for entry in data:
                  if isinstance(entry, dict):
                      txt = entry.get('text', '')
                  else:
                      txt = getattr(entry, 'text', '')
                  if txt:
                      texts.append(txt)
              full_text = ' '.join(texts)
              full_text = full_text.replace('\n', ' ')
              full_text = ' '.join(full_text.split())
              write(full_text)
              print(f"SUCCESS: Transcript saved - {len(full_text)} characters")

          except TranscriptsDisabled:
              msg = f"Transcripts are disabled for video {video_id}"
              print('FAILED:', msg)
              write(msg)
          except NoTranscriptFound:
              msg = f"No transcript found for video {video_id}"
              print('FAILED:', msg)
              write(msg)
          except VideoUnavailable:
              msg = f"Video unavailable: {video_id}"
              print('FAILED:', msg)
              write(msg)
          except Exception as e:
              msg = f"Error fetching transcript for video {video_id}: {e}"
              print('ERROR:', e)
              write(msg)
          EOF

      - name: Upload transcript as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.extract.outputs.artifact_name }}
          path: transcript.txt
          retention-days: 7

      - name: Output transcript
        run: |
          echo "=== TRANSCRIPT OUTPUT ==="
          cat transcript.txt
          echo ""
          echo "=== LENGTH ==="
          wc -c transcript.txt
